name: DIGIT CLI Release

on:
  push:
    tags:
      - 'digit-cli-v*'
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: digit-cli/go.sum

      - name: Extract semver from tag
        id: semver
        run: |
          VERSION="${GITHUB_REF_NAME#digit-cli-}"
          git tag "$VERSION" || true
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: digit-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.semver.outputs.tag }}
