workflow:
  process:
    name: "Application Processing Workflow"
    code: "PGR67"
    description: "A complete workflow for application processing"
    version: "1.0"
    sla: 86400
  states:
    - code: "INIT"
      name: "Init"
      type: "INITIAL"
      sla: 86400
      actions:
        - code: "APPLY"
          label: "Apply"
          nextState: "PENDINGFORASSIGNMENT"
    - code: "PENDINGFORASSIGNMENT"
      name: "Pending For Assignment"
      type: "INTERMEDIATE"
      sla: 43200
      actions:
        - code: "ASSIGN"
          label: "Assign"
          nextState: "PENDINGATLME"
        - code: "REJECT"
          label: "Reject"
          nextState: "REJECTED"
    - code: "PENDINGATLME"
      name: "Pending At LME"
      type: "INTERMEDIATE"
      sla: 43200
      actions:
        - code: "RESOLVE"
          label: "Resolve"
          nextState: "RESOLVED"
        - code: "REASSIGN"
          label: "Reassign"
          nextState: "PENDINGFORREASSIGNMENT"
    - code: "PENDINGFORREASSIGNMENT"
      name: "Pending For Reassignment"
      type: "INTERMEDIATE"
      sla: 43200
      actions:
        - code: "REASSIGN"
          label: "Reassign"
          nextState: "PENDINGATLME"
    - code: "REJECTED"
      name: "Rejected"
      type: "INTERMEDIATE"
      sla: 43200
      actions:
        - code: "REOPEN"
          label: "Reopen"
          nextState: "PENDINGFORASSIGNMENT"
        - code: "RATE"
          label: "Rate"
          nextState: "CLOSEDAFTERREJECTION"
    - code: "RESOLVED"
      name: "Resolved"
      type: "INTERMEDIATE"
      sla: 43200
      actions:
        - code: "REOPEN"
          label: "Reopen"
          nextState: "PENDINGFORASSIGNMENT"
        - code: "RATE"
          label: "Rate"
          nextState: "CLOSEDAFTERRESOLUTION"
    - code: "CLOSEDAFTERREJECTION"
      name: "Closed After Rejection"
      type: "TERMINAL_FAILURE"
      sla: 0
      actions: []
    - code: "CLOSEDAFTERRESOLUTION"
      name: "Closed After Resolution"
      type: "TERMINAL_SUCCESS"
      sla: 0
      actions: []
